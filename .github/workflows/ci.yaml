name: CI — Build and Push Docker Images
on:
  push:
    branches: [ main, vivian ]
  pull_request:
    branches: [ main ]
env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
jobs:
  build-and-push:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - frontend
          - cartservice
          - productcatalogservice
          - currencyservice
          - paymentservice
          - shippingservice
          - emailservice
          - checkoutservice
          - recommendationservice
          - adservice
          - loadgenerator
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        id: build
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          if [ "${{ matrix.service }}" = "cartservice" ]; then
            DOCKERFILE="./src/cartservice/Dockerfile"
            BUILD_CONTEXT="./src/cartservice/src"
          else
            DOCKERFILE="./src/${{ matrix.service }}/Dockerfile"
            BUILD_CONTEXT="./src/${{ matrix.service }}"
          fi
          IMAGE_URI="${{ env.ECR_REGISTRY }}/online-boutique/${{ matrix.service }}:${IMAGE_TAG}"
          echo "Building image: $IMAGE_URI"
          docker build -f "$DOCKERFILE" -t "$IMAGE_URI" "$BUILD_CONTEXT"
          echo "Pushing image: $IMAGE_URI"
          docker push "$IMAGE_URI"

  update-helm-values:
    name: Update Helm values
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/vivian'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Update all image tags in Helm values
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          services=(
            frontend cartservice productcatalogservice currencyservice
            paymentservice shippingservice emailservice checkoutservice
            recommendationservice adservice loadgenerator
          )
          for service in "${services[@]}"; do
            yq -i ".$service.image.tag = \"${IMAGE_TAG}\"" helm-chart/values.yaml
            echo "Updated $service to ${IMAGE_TAG}"
          done

      - name: Commit and push updated values
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add helm-chart/values.yaml
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "ci: update all images to ${IMAGE_TAG}"
          git push origin ${{ github.ref_name }}

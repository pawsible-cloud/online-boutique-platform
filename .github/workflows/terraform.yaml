name: Terraform

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
    paths:
      - "terraform/**"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "terraform/**"

  workflow_dispatch:
    inputs:
      module:
        description: "Which module to target (ecr | infra | both)"
        required: true
        default: "both"
        type: choice
        options:
          - ecr
          - infra
          - both
      action:
        description: "Terraform action to run"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply
          - destroy

permissions:
  contents: read
  pull-requests: write

env:
  TF_VERSION: "1.7.5"
  AWS_REGION: ${{ secrets.STEPH_AWS_REGION }}

jobs:
  detect-changes:
    name: Detect changed modules
    runs-on: ubuntu-latest
    outputs:
      ecr:   ${{ steps.filter.outputs.ecr }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            ecr:
              - 'terraform/ecr/**'
            infra:
              - 'terraform/infra/**'

  terraform-ecr:
    name: "Terraform · ECR"
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.ecr == 'true' ||
      (github.event_name == 'workflow_dispatch' && (inputs.module == 'ecr' || inputs.module == 'both'))
    defaults:
      run:
        working-directory: terraform/ecr

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.STEPH_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.STEPH_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.STEPH_AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform fmt check
        id: fmt
        run: terraform fmt -check
        continue-on-error: true

      - name: Terraform init
        id: init
        run: terraform init

      - name: Terraform validate
        id: validate
        run: terraform validate

      - name: Terraform plan
        id: plan
        run: terraform plan -no-color -out=tfplan
        continue-on-error: true

      - name: Post plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          PLAN: ${{ steps.plan.outputs.stdout }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `### Terraform Plan · ECR 📦
            #### Format: \`${{ steps.fmt.outcome }}\` | Init: \`${{ steps.init.outcome }}\` | Validate: \`${{ steps.validate.outcome }}\` | Plan: \`${{ steps.plan.outcome }}\`

            <details><summary>Show Plan</summary>

            \`\`\`terraform
            ${process.env.PLAN}
            \`\`\`

            </details>

            *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

      # Auto-apply on push to develop or main
      - name: Terraform apply
        if: |
          (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop') &&
          github.event_name == 'push' &&
          steps.plan.outcome == 'success'
        run: terraform apply -auto-approve tfplan

      - name: Terraform apply (manual)
        if: |
          github.event_name == 'workflow_dispatch' &&
          inputs.action == 'apply'
        run: terraform apply -auto-approve

  terraform-infra:
    name: "Terraform · Infra"
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.infra == 'true' ||
      (github.event_name == 'workflow_dispatch' && (inputs.module == 'infra' || inputs.module == 'both'))
    defaults:
      run:
        working-directory: terraform/infra

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.STEPH_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.STEPH_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.STEPH_AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform fmt check
        id: fmt
        run: terraform fmt -check
        continue-on-error: true

      - name: Terraform init
        id: init
        run: terraform init

      - name: Terraform validate
        id: validate
        run: terraform validate

      - name: Terraform plan
        id: plan
        run: terraform plan -no-color -out=tfplan
        continue-on-error: true

      - name: Post plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          PLAN: ${{ steps.plan.outputs.stdout }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `### Terraform Plan · Infra 🏗️
            #### Format: \`${{ steps.fmt.outcome }}\` | Init: \`${{ steps.init.outcome }}\` | Validate: \`${{ steps.validate.outcome }}\` | Plan: \`${{ steps.plan.outcome }}\`

            <details><summary>Show Plan</summary>

            \`\`\`terraform
            ${process.env.PLAN}
            \`\`\`

            </details>

            *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

      # Infra apply only on main (EKS is expensive — don't auto-apply on develop)
      - name: Terraform apply
        if: |
          github.ref == 'refs/heads/main' &&
          github.event_name == 'push' &&
          steps.plan.outcome == 'success'
        run: terraform apply -auto-approve tfplan

      - name: Terraform apply (manual)
        if: |
          github.event_name == 'workflow_dispatch' &&
          inputs.action == 'apply'
        run: terraform apply -auto-approve

      - name: Terraform destroy (manual only)
        if: |
          github.event_name == 'workflow_dispatch' &&
          inputs.action == 'destroy' &&
          inputs.module == 'infra'
        run: terraform destroy -auto-approve

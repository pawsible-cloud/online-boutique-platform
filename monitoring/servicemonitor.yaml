apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: online-boutique
  namespace: monitoring
  labels:
    release: prometheus
spec:
  namespaceSelector:
    matchNames:
      - online-boutique
  selector:
    matchLabels: {}
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
